[tool.mutmut]
paths_to_mutate = [
  "lib_core/utils"
]
tests_dir = [
  "tests"
]
runner = "python -m pytest -m regression -q"
do_not_mutate = [
  "__init__.py"
]

[tool.flake8]
max-line-length = 120

exclude = [
  ".git",
  "__pycache__",
  ".venv",
  "venv",
  "env",
  ".env"
]

extend-ignore = [
  "W391",  # blank line at end
  "W292",  # newline missing
  "F403",  # behave import *
  "F405"   # behave given/when/then
]