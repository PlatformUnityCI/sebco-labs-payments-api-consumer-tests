[pytest]
addopts = -p no:warnings -s -r xX -v --tb=short --html=./report/html-report.html --self-contained-html

log_cli = true
log_level = INFO
log_format = %(asctime)s | %(levelname)s >>> %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
norecursedirs = 
    mutants 
    .git 
    .venv 
    __pycache__ 
    .pytest_cache
    .hypothesis
    
pythonpath = .

markers =
    regression: feature test regression suite
    payments_behave: feature test payment suite
    payments_hypothesis: property-based tests using Hypothesis